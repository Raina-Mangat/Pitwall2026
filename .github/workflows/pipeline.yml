name: PitWall Automation

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache FastF1
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastf1
          key: fastf1-${{ runner.os }}

      - name: Create cache directory
        run: mkdir -p ~/.cache/fastf1

      # Generate prediction for the next race
      - name: Run prediction pipeline
        run: python pipeline.py

      # Update completed races, results and accuracy
      - name: Run backfill
        run: python backfill.py

      - name: Commit updated files
        run: |
          git config --global user.name "PitWall Bot"
          git config --global user.email "actions@github.com"

          git add predictions/
          git add results/
          git add all_predictions_log.csv
          git add model_accuracy_log.csv

          git diff --cached --quiet || (
            git commit -m "🤖 Automated race update"
            git push
          )