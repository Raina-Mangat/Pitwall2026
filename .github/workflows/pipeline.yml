name: PitWall Automation

permissions:
  contents: write

on:
  workflow_dispatch:

  schedule:
    - cron: '0 18 * * 6'
    - cron: '0 16 * * 0'
    - cron: '0 8 * * 1'

jobs:
  pipeline:

    runs-on: ubuntu-latest

    timeout-minutes: 20

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache FastF1
        uses: actions/cache@v4
        with:
          path: cache
          key: fastf1-${{ runner.os }}
          restore-keys: fastf1-

      - name: Run pipeline
        run: python pipeline.py

      - name: Commit updated files
        run: |
          git config --global user.name "PitWall Bot"
          git config --global user.email "pitwall@github.com"

          git add .

          git diff --cached --quiet || git commit -m "🤖 Automated race update"

          git push